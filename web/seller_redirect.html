<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dominus • Abrindo loja</title>
    <style>
      :root {
        font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        color: #0f172a;
        background: #f4f4fb;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(480px, 100%);
        background: #fff;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 30px 90px rgba(15, 23, 42, 0.18);
        text-align: center;
      }
      h1 {
        margin-top: 0;
        font-size: 1.75rem;
        color: #312e81;
      }
      p {
        color: #475569;
        line-height: 1.5;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        flex: 1;
        min-width: 160px;
        text-decoration: none;
        padding: 14px 16px;
        border-radius: 12px;
        font-weight: 600;
        border: 2px solid transparent;
      }
      .btn-primary {
        background: #4f46e5;
        color: #fff;
      }
      .btn-secondary {
        background: transparent;
        color: #4f46e5;
        border-color: rgba(79, 70, 229, 0.3);
      }
      .hint {
        font-size: 0.85rem;
        margin-top: 16px;
        color: #94a3b8;
      }
      @media (max-width: 480px) {
        .card {
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Estamos abrindo o Dominus…</h1>
      <p id="status">Se o aplicativo estiver instalado, ele sera aberto automaticamente.</p>
      <div class="actions">
        <a id="openAppBtn" class="btn btn-primary" href="#">Abrir Dominus</a>
        <a id="webBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener">Ver loja no navegador</a>
      </div>
      <p class="hint">Caso nada aconteca em alguns segundos, toque em "Ver loja no navegador".</p>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const getParam = (key) => {
          let value = params.get(key);
          if (value) return value;

          const rawHash = window.location.hash || '';
          const hash = rawHash.replace(/^#/, '').replace(/^\?/, '');
          if (!hash) return null;

          const hashParams = new URLSearchParams(hash);
          value = hashParams.get(key);
          if (value) return value;

          if (hash.startsWith('/')) {
            const parts = hash.split('/').filter(Boolean);
            if (parts.length >= 2 && parts[0] === key) return parts[1];
          }
          return null;
        };

        const sellerId = getParam('seller');
        const openAppBtn = document.getElementById('openAppBtn');
        const webBtn = document.getElementById('webBtn');
        const statusText = document.getElementById('status');

        if (!sellerId) {
          statusText.textContent = 'Link invalido. Escaneie novamente o QR Code ou solicite um novo link ao lojista.';
          openAppBtn.style.display = 'none';
          webBtn.href = 'https://darlysson717.github.io/DOMINUSWEB/';
          webBtn.textContent = 'Voltar';
          return;
        }

        const customSchemeUrl = `dominus://seller/${sellerId}`;
        const webBaseUrl = 'https://darlysson717.github.io/DOMINUSWEB';
        const browserUrl = `${webBaseUrl}/#/seller/${sellerId}`;
        let didHide = false;

        const scheduleFallback = () => {
          setTimeout(() => {
            if (!didHide) {
              statusText.textContent = 'App nao encontrado. Abrindo no navegador.';
              webBtn.textContent = 'Continuar no navegador';
              webBtn.href = browserUrl;
            }
          }, 1400);
        };

        const tryOpenApp = () => {
          didHide = false;
          scheduleFallback();
          window.location.href = customSchemeUrl;
        };

        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'hidden') {
            didHide = true;
          }
        });

        openAppBtn.addEventListener('click', (event) => {
          event.preventDefault();
          tryOpenApp();
        });

        webBtn.href = browserUrl;

        // Auto trigger on load
        tryOpenApp();
      })();
    </script>
  </body>
</html>
